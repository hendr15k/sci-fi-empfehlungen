<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sci-Fi Empfehlungen für Hendrik</title>
<style>
:root{--bg:#0a0a0f;--card:#14141f;--border:#2a2a3a;--text:#e0e0e8;--text-muted:#9090a0;--accent:#6c63ff;--accent-glow:rgba(108,99,255,.3);--star-gold:#ffd700;--top3-border:#6c63ff;--new-badge:#00c853;--de-badge:#ff6600;--progress-bg:#2a2a3a;--progress-fill:linear-gradient(90deg,#6c63ff,#e040fb);--input-bg:#1a1a2a;--input-border:#3a3a4a}
body.light{--bg:#f5f5fa;--card:#fff;--border:#ddd;--text:#222;--text-muted:#666;--accent:#5b4dff;--accent-glow:rgba(91,77,255,.2);--star-gold:#d4a800;--top3-border:#5b4dff;--new-badge:#00a843;--de-badge:#e55a00;--progress-bg:#e0e0e8;--progress-fill:linear-gradient(90deg,#5b4dff,#c840fb);--input-bg:#eee;--input-border:#ccc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'sans-serif');background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:background .3s,color .3s}
.container{max-width:960px;margin:0 auto;padding:20px}
header{text-align:center;padding:50px 20px 30px;background:linear-gradient(135deg,#1a1a2e 0%,#0a0a0f 100%);border-bottom:1px solid var(--border);position:relative}
body.light header{background:linear-gradient(135deg,#e8e8ff 0%,#f5f5fa 100%)}
header h1{font-size:2.4em;font-weight:800;background:linear-gradient(135deg,#6c63ff 0%,#e040fb 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header .meta{color:var(--text-muted);font-size:.95em}
header .badge{display:inline-block;background:#00c853;color:#000;font-weight:700;padding:3px 10px;border-radius:12px;font-size:.85em;margin-left:8px}

/* Theme Toggle */
.theme-toggle{position:absolute;top:15px;right:15px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:1.1em;color:var(--text)}

/* Search */
.search-section{margin:20px 0;position:relative}
.search-input{width:100%;padding:14px 20px 14px 48px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;color:var(--text);font-size:1em;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1.1em}

/* Sort Controls */
.sort-section{margin:15px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sort-btn{background:var(--card);color:var(--text-muted);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:.85em;cursor:pointer;transition:all .2s}
.sort-btn:hover,.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sort-label{color:var(--text-muted);font-size:.85em;margin-right:4px}

/* Random Picker */
.random-section{margin:20px 0;padding:20px;background:linear-gradient(135deg,#2a2640 0%,var(--card) 100%);border:1px solid var(--accent);border-radius:12px;text-align:center}
.random-btn{background:linear-gradient(135deg,#6c63ff,#e040fb);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s}
.random-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(108,99,255,.4)}
.random-result{margin-top:15px;padding:15px;background:rgba(108,99,255,.1);border-radius:8px;display:none;font-size:1.1em}
.random-result.show{display:block}

/* Progress Bar */
.progress-section{margin:20px 0;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.progress-text{text-align:center;color:var(--text-muted);font-size:.9em;margin-top:4px}
.progress-bar-container{background:var(--progress-bg);border-radius:8px;height:24px;margin:10px 0;position:relative;overflow:hidden}
.progress-bar-fill{background:var(--progress-fill);height:100%;border-radius:8px;transition:width .4s ease}

/* Sections */
.section{margin:30px 0;padding:25px;background:linear-gradient(135deg,#1a1a3e 0%,var(--card) 100%);border:2px solid var(--top3-border);border-radius:16px;position:relative}
.section::before{position:absolute;top:-12px;left:20px;font-size:.8em;font-weight:700;padding:3px 12px;border-radius:8px;color:#fff}
.top::before{content:"TOP-5 FÜr DICH";background:var(--top3-border)}
.award::before{content:"🏆 HUGO, NEBULA & GOODREADS 2025";background:#00c853;color:#000}
.series::before{content:"📚 WELCHE SERIE ZUERST?";background:#cc55ee}
.recs::before{content:"🎯 ALS NACHSTES LESEN";background:#4a9eff;color:#000}
.de::before{content:"🇩🇪 DEUTSCHSPRACHIGE SCI-FI";background:#ff6600;color:#000}
.rec-card{background:rgba(74,158,255,.1);padding:15px;border-radius:8px;margin:10px 0;border-left:3px solid #4a9eff}
.rec-card strong{color:#4a9eff}
.series-order{background:rgba(204,85,238,.1);padding:12px;border-radius:8px;margin:12px 0}
.series-order strong{color:#cc55ee}

/* Filter Tabs */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin:25px 0 15px;justify-content:center}
.filter-btn{background:var(--card);color:var(--text-muted);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:.85em;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Book Grid */
.book-grid{display:grid;gap:16px;margin:20px 0}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:transform .2s,box-shadow .2s,opacity .2s}
.book-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px var(--accent-glow)}
.book-card.read-yes{border-left:3px solid #00c853;opacity:.75}
.book-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.book-title{font-size:1.15em;font-weight:700;color:#fff}
body.light .book-title{color:#222}
.book-meta{color:var(--text-muted);font-size:.9em;margin-top:4px}
.rating{color:var(--star-gold);font-size:1.1em;white-space:nowrap}
.subgenre{display:inline-block;background:rgba(108,99,255,.15);color:var(--accent);font-size:.8em;padding:2px 8px;border-radius:8px;margin:6px 0}
.badge{display:inline-block;font-size:.75em;font-weight:700;padding:2px 8px;border-radius:8px;margin-left:4px;vertical-align:middle}
.badge-award{background:rgba(0,200,83,.15);color:#00c853}
.badge-series{background:rgba(204,85,238,.15);color:#cc55ee}
.badge-de{background:rgba(255,102,0,.15);color:#ff6600}
.why{margin-top:8px;color:var(--text-muted);font-size:.95em;font-style:italic}

/* Checkbox */
.read-cb{margin-right:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.read-cb input{position:absolute;opacity:0;width:0;height:0}
.cb-mark{display:inline-flex;width:20px;height:20px;border:2px solid var(--border);border-radius:4px;background:var(--card);align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.read-cb input:checked~.cb-mark{background:#00c853;border-color:#00c853}
.read-cb input:checked~.cb-mark::after{content:'✓';color:#fff}

/* Reset */
.reset-btn{display:block;margin:10px auto;background:var(--card);color:var(--text-muted);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85em}
.reset-btn:hover{background:#ff4444;color:#fff;border-color:#ff4444}

footer{text-align:center;padding:30px;color:var(--text-muted);font-size:.85em;border-top:1px solid var(--border);margin-top:30px}
footer a{color:var(--accent)}

.hidden{display:none !important}

@media(max-width:600px){header h1{font-size:1.6em}.book-card{padding:14px}.filter-btn{font-size:.78em;padding:5px 10px}.random-btn{width:100%}}

/* BIG COVERS */
.book-cover{width:200px;min-width:200px;height:300px;border-radius:12px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-head{display:flex!important;align-items:flex-start;gap:20px!important;flex-wrap:nowrap}
.book-info{flex:1;min-width:0}
.book-card{padding:16px!important}
@media(max-width:600px){.book-cover{width:120px;min-width:120px;height:180px}.book-head{gap:12px!important}}
.cover-img{width:50px;height:75px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);opacity:.9;transition:opacity .3s}
.book-card:hover .cover-img{opacity:1}
.cover-wrap{display:flex;flex-direction:column;justify-content:center;margin-top:6px}


.planer-section{margin:30px 0;padding:25px;background:linear-gradient(135deg,#2a1a4e,#1a1a2e);border:2px solid #8b00ff;border-radius:16px;position:relative}
.planer-badge{position:absolute;top:-12px;left:20px;font-size:.8em;font-weight:700;padding:3px 12px;border-radius:8px;color:#fff;background:#8b00ff}
.planer-btn{width:100%;padding:12px 20px;background:linear-gradient(135deg,#8b00ff,#6c00eb);color:#fff;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:600;transition:transform .2s,box-shadow .2s}
.planer-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(139,0,255,.3)}
.planer-rec{background:rgba(139,0,255,.08);padding:12px 16px;border-radius:10px;font-size:.95em;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.planer-rec strong{color:#e040fb}
.planer-rec .match-badge{background:#8b00ff;color:#fff;padding:2px 10px;border-radius:20px;font-size:.75em;font-weight:600}



</head>

function getCoverWrap(idx) {
    var cid = coverMap[idx] || coverCache[idx];
    if (cid) {
        return '<div class="book-cover"><img class="cover-img" src="https://covers.openlibrary.org/b/id/' + cid + '-M.jpg" alt="" loading="lazy"></div>';
    }
    // Placeholder + lazy-load trigger

function renderList() {
    var list = [];
    for (var i = 0; i < books.length; i++) list.push({d: books[i], i: i});

    // Search filter
    if (currentSearch) {
        var q = currentSearch.toLowerCase();
        list = list.filter(function(x) {
            return x.d.title.toLowerCase().indexOf(q) >= 0 ||
                   x.d.author.toLowerCase().indexOf(q) >= 0 ||
                   x.d.year.indexOf(q) >= 0 ||
                   x.d.genre.toLowerCase().indexOf(q) >= 0 ||
                   x.d.why.toLowerCase().indexOf(q) >= 0;
        });
    }

    // Category filter
    if (currentFilter === 'read') list = list.filter(function(x) { return readState[x.i]; });
    else if (currentFilter === 'unread') list = list.filter(function(x) { return !readState[x.i]; });
    else if (currentFilter === 'award') list = list.filter(function(x) { return x.d.tags && x.d.tags.indexOf('award') >= 0; });
    else if (currentFilter === 'series') list = list.filter(function(x) { return x.d.tags && x.d.tags.indexOf('series') >= 0; });
    else if (currentFilter === 'de') list = list.filter(function(x) { return x.d.tags && x.d.tags.indexOf('de') >= 0; });
    else if (currentFilter !== 'all') list = list.filter(function(x) { return x.d.genre.indexOf(currentFilter) >= 0; });

    // Sort
    if (currentSort === 'rating') list.sort(function(a, b) { return b.d.rating - a.d.rating; });
    else if (currentSort === 'year') list.sort(function(a, b) { return parseInt(b.d.year) - parseInt(a.d.year); });
    else if (currentSort === 'title') list.sort(function(a, b) { return a.d.title.localeCompare(b.d.title); });
    else if (currentSort === 'author') list.sort(function(a, b) { return a.d.author.localeCompare(b.d.author); });

    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (var k = 0; k < list.length; k++) {
        var b = list[k].d;
        var i = list[k].i;
        var r = readState[i] ? true : false;
        var cls = 'book-card' + (r ? ' read-yes' : '');
        var badges = '';
        if (b.tags && b.tags.indexOf('award') >= 0) badges += '<span class="badge badge-award">🏆 AWARD</span>';
        if (b.tags && b.tags.indexOf('series') >= 0) badges += '<span class="badge badge-series">📚 Serie</span>';
        if (b.tags && b.tags.indexOf('de') >= 0) badges += '<span class="badge badge-de">🇩🇪 DE</span>';
        grid.innerHTML += '<div class="' + cls + '">' +
            '<div class="book-head">' + getCoverWrap(i) + '<div class="book-info">' +
            '<div class="book-title">' +
            '<label class="read-cb"><input type="checkbox" ' + (r ? 'checked' : '') + ' onclick="toggleRead(' + i + ')"><span class="cb-mark"></span></label>' +
            b.title + badges + '</div>' +
            '<div class="book-meta">' + b.author + ' (' + b.year + ')</div>' +
            '</div><div class="rating">' + b.stars + '</div></div>' +
            '<span class="subgenre">' + b.genre + '</span>' +
            '<div class="why">' + b.why + '</div></div>';
    }
    document.getElementById('statsInfo').textContent = books.length + ' Titel' + (currentFilter !== 'all' ? ' — Filter: ' + currentFilter : '') + (currentSearch ? ' — Suche: "' + currentSearch + '"' : '');
}

function toggleRead(idx) {
    if (readState[idx]) delete readState[idx]; else readState[idx] = true;
    saveState(); updateProgress(); renderList();
}

function updateProgress() {
    var total = books.length, read = 0;
    for (var i = 0; i < total; i++) { if (readState[i]) read++; }
    document.getElementById('readCount').textContent = read;
    document.getElementById('readPct').textContent = Math.round((read / total) * 100);
    document.getElementById('progressFill').style.width = ((read / total) * 100) + '%';
}

    var icon = document.body.classList.contains('light') ? '☀️' : '🌙';
    this.textContent = icon;
    try { localStorage.setItem('scifi_theme', document.body.classList.contains('light') ? 'light' : 'dark'); } catch(e) {}
};

document.getElementById('randomBtn').onclick = function() {
    // Prefer unread books
    var pool = [];
    for (var i = 0; i < books.length; i++) { if (!readState[i]) pool.push(i); }
    if (pool.length === 0) pool = books.map(function(_, i) { return i; });
    var idx = pool[Math.floor(Math.random() * pool.length)];
    var b = books[idx];

// Export functions
function exportCSV() {
    var rows = ['Titel,Autor,Jahr,Genre,Rating,Gelesen'];
    for (var i = 0; i < books.length; i++) {
        var b = books[i];
        var gelesen = readState[i] ? 'Ja' : 'Nein';
        rows.push('"' + b.title + '","' + b.author + '",' + b.year + ',"' + b.genre + '",' + b.rating + ',' + gelesen);
    }
    downloadFile(rows.join('\n'), 'scifi-empfehlungen-' + new Date().toISOString().slice(0, 10) + '.csv', 'text/csv');
}

function exportJSON() {
    var data = books.map(function(b, i) {
        return { titel: b.title, autor: b.author, jahr: b.year, genre: b.genre, rating: b.rating, gelesen: !!readState[i] };
    });
    downloadFile(JSON.stringify(data, null, 2), 'scifi-empfehlungen-' + new Date().toISOString().slice(0, 10) + '.json', 'application/json');
}

function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

    var active = 0;
    var maxActive = 3; // 3 parallel streams
    
    function loadOne(idx) {
        var b = books[idx];
        fetch('https://openlibrary.org/search.json?title=' + encodeURIComponent(b.title) +
            '&author=' + encodeURIComponent(b.author.split(' + ')[0]) +
            '&limit=1&fields=cover_i')
            .then(r => r.json())
            .then(d => {
                if (d.docs && d.docs[0] && d.docs[0].cover_i) {
                    var cid = d.docs[0].cover_i;
                    coverCache[idx] = cid;
                    try { localStorage.setItem('scifi_covers_v1', JSON.stringify(coverCache)); } catch(e) {}
                    var placeholder = document.querySelector('.cover-placeholder[data-idx="' + idx + '"]');
                    if (placeholder) {
                        placeholder.outerHTML = '<img class="cover-img" src="https://covers.openlibrary.org/b/id/' + cid + '-M.jpg" alt="" loading="lazy">';
                    }
                    console.log('[covers] Found: ' + b.title + ' → #' + cid);
                }
            })
            .catch(function(e) { console.log('[covers] Failed: ' + b.title); })
            .then(function() { active--; runNext(); });
    }
    
    function runNext() {
        if (!toLoad.length || active >= maxActive) return;
        active++;
        loadOne(toLoad.shift());
        setTimeout(runNext, delay); // Rate limit
    }
    
    // Start 3 parallel
    for (var i = 0; i < maxActive; i++) runNext();
})();



// Reading-Planer
function generateRecommendations() {
    if (typeof bookRecs === 'undefined') { return; }
    var readIds = [];
    for (var k in readState) {
        if (readState[k] && readState[k] === 1) {
            readIds.push(parseInt(k));
        }
    }
    if (readIds.length === 0) {
        document.getElementById('planerResults').innerHTML =
            '<div class="planer-rec">Markiere zuerst Bücher als gelesen (Status-Button)!</div>';
        return;
    }
    var scores = {};
    for (var r = 0; r < readIds.length; r++) {
        var rid = readIds[r];
        if (bookRecs[rid]) {
            for (var j = 0; j < bookRecs[rid].length; j++) {
                var bid = bookRecs[rid][j];
                if (!readState[bid] || readState[bid] !== 1) {
                    scores[bid] = (scores[bid] || 0) + 1;
                }
            }
        }
    }
    var sorted = [];
    for (var bid in scores) { sorted.push({id: parseInt(bid), score: scores[bid]}); }
    sorted.sort(function(a, b) { return b.score - a.score; });
    var top = sorted.slice(0, 8);
    if (top.length === 0) {
        document.getElementById('planerResults').innerHTML =
            '<div class="planer-rec">Du hast alle empfohlenen Bücher! 🎉</div>';
        return;
    }
    var lines = [];
    for (var i = 0; i < top.length; i++) {
        var b = books[top[i].id];
        var stars = '';
        for (var s = 0; s < b.rating; s++) stars += '⭐';
        lines.push('<div class="planer-rec"><div><strong>' + b.title + '</strong><br>' +
            b.author + '<br><small>' + stars + ' ' + b.genre + '</small></div>' +
            '<span class="match-badge">🔥 ' + top[i].score + ' Matches</span></div>');
    }
    document.getElementById('planerResults').innerHTML =
        '<div style="margin-top:16px">' +
        '<h3 style="font-size:1em;color:var(--text);margin-bottom:12px;opacity:.8">Dein persönlicher Leseplan (' +
        readIds.length + ' gelesen → ' + top.length + ' Empfehlungen)</h3>' +
        lines.join('') + '</div>';
}
